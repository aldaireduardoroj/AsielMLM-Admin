<div class="container-fluid p-0">
  <nav
    class="navbar navbar-expand-lg border-bottom d-flex d-md-none"
    id="navbar-example2"
  >
    <div class="container-xxl align-items-center">
      <a class="navbar-brand pt-1" [routerLink]="'/home'">
        <img
          src="assets/images/Logo.png"
          alt=""
          class="img-fluid"
          width="169px"
        />
      </a>
      <div>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="19"
            viewBox="0 0 24 19"
            fill="none"
          >
            <rect width="24" height="3" rx="1.5" fill="#423838" />
            <rect y="8" width="24" height="3" rx="1.5" fill="#423838" />
            <rect
              x="10"
              y="16"
              width="13.8947"
              height="3"
              rx="1.5"
              fill="#423838"
            />
          </svg>
        </button>

        <img
          nz-image
          *ngIf="isAuth"
          width="40px"
          height="40px"
          [nzSrc]="avatarUrl"
          [nzDisablePreview]="true"
          class="d-md-none rounded-circle ml-1 border border-3"
        />
      </div>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a
              class="nav-link"
              href="javascript: void(0)"
              (click)="goTo('inicio-section')"
              >Inicio</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="javascript: void(0)"
              (click)="goTo('team-section')"
              >Nosotros</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              href="javascript: void(0)"
              (click)="goTo('valores-section')"
              >Valores</a
            >
          </li>
          <li class="nav-item d-block d-md-none">
            <a
              class="nav-link"
              href="javascript: void(0)"
              (click)="goTo('testimonial-section')"
              >Testimonios</a
            >
          </li>
          <li class="nav-item d-block d-md-none">
            <a
              class="nav-link"
              [routerLink]="'/auth/login'"
              [routerLinkActive]="'active'"
              >Inicio Sesión</a
            >
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div
    class="row align-items-stretch m-0 p-0 container-mobile bg--auth-shape"
    style="min-height: 100vh"
  >
    <div class="col-lg-5 col-12 ">
      <div class="row align-items-center h-100">
        <div>
          <div class="row">
            <div class="col-12 m-b-40 d-none d-sm-block">
              <a class="navbar-brand pt-1" [routerLink]="'/home'">
                <img
                  src="assets/images/Logo.png"
                  alt=""
                  class="img-fluid"
                  width="169px"
                />
              </a>
            </div>
            <div class="col-12">
              <router-outlet></router-outlet>
            </div>
          </div>
        </div>

      </div>
    </div>
    <div
      class="col-lg-7 d-none d-lg-block"
      style="
        background-image: url(&quot;assets/images/Frame 480965928.png&quot;);
        background-repeat: no-repeat;
        background-size: cover;
      "
    >
      <div class="row text-center align-items-center h-100">
        <div>
          <div class="row">
            <div class="col-12 text-center m-b-20">
              <img src="assets/images/image 34.png" alt="" class="img-fluid">
            </div>
            <div class="col-12 text-center p-r-40 p-l-40">
              <h1 class="m-0 text-white fs-30">Easy Panel, el Dashboard para industria MLM más completo y fácil de utilizar</h1>
            </div>
            <div class="col-12 text-center p-r-40 p-l-40">
              <p class="m-0 text-gray-4">Impulsa tu negocio con el sistema MLM Easy Panel, el sistema más completo de la industria, Atendemos para planes Unilevel y matríz forzada.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
